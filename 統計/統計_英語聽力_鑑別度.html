<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>英語聽力 鑑別度 統計排行</title>

<style>
body { font-family: sans-serif; padding: 16px; }
.year-filter { margin-bottom: 12px; }
.year-filter label { font-weight: bold; margin-right: 8px; }
.year-filter select { font-size: 14px; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; }
#statTable { border-collapse: collapse; width: 100%; }
#statTable th, #statTable td { border: 1px solid #ccc; padding: 6px 10px; }
#statTable thead { background: #f0f4ff; }
#statTable tbody tr:hover { background: #f9f9f9; }
</style>

<script>
function filterYear(){
  var val = document.getElementById('yearFilter').value;
  var rows = document.querySelectorAll('#statTable tbody tr');
  rows.forEach(function(r){
    var year = r.cells[0].textContent.trim();
    r.style.display = (val === 'all' || year === val) ? '' : 'none';
  });
}
document.addEventListener('DOMContentLoaded', filterYear);
</script>
</head>
<body>
  <h2>英語聽力 - 鑑別度 統計排行</h2>
  <div class="year-filter">
    <label for="yearFilter">選擇學年度：</label>
    <select id="yearFilter" onchange="filterYear()">
    <option value="all">全部</option>
    </select>
  </div>
<table class="dataframe" id="statTable">
  <thead>
    <tr style="text-align: right;">
      <th>年度</th>
      <th>科目</th>
      <th>題號</th>
      <th>題目</th>
      <th>鑑別度</th>
      <th>通過率</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
</body>
</html>
